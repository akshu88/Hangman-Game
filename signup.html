<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman - Sign Up</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="login-card">

    <div class="logo">
      <span class="hangman-icon">🪢</span>
      <h1>Hangman</h1>
      <p>Create an account</p>
    </div>

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Choose a username" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Choose a password" />
    </div>

    <div class="form-group">
      <label for="confirm-password">Confirm Password</label>
      <input type="password" id="confirm-password" placeholder="Repeat your password" />
    </div>

    <p id="error-msg"></p>

    <button class="btn-login" onclick="handleSignup()">Sign Up</button>

    <p class="signup-text">Already have an account? <a href="login.html">Login</a></p>

  </div>

  <script src="signup.js"></script>
</body>
</html>
