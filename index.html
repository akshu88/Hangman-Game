<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hangman Game</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      font-family: 'Segoe UI', sans-serif;
      background-color: #0f0f0f;
      min-height: 100vh;
      color: #ffffff;
    }

    #top-bar {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      width: 190px;
      min-height: 100vh;
      padding: 24px 15px;
      background-color: #1a1a2e;
      position: fixed;
      right: 0;
      top: 0;
    }

    #top-bar h1 {
      font-size: 1rem;
      color: #fff;
      margin-bottom: 30px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    #top-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .top-btn {
      width: 100%;
      text-align: left;
      padding: 11px 14px;
      border: none;
      border-radius: 8px;
      background-color: #16213e;
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 0.2s;
    }

    .top-btn:hover { background-color: #0f3460; }

    .top-btn.logout {
      background-color: #7b2d2d;
      margin-top: 20px;
    }

    .top-btn.logout:hover { background-color: #a33a3a; }

    #main-content {
      margin-right: 190px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    #player-name { display: none; }

    #hangman-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 44px;
    }

    #hangman-icon canvas {
      background: #1a1a2e;
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    #hangman-icon h2 {
      margin-top: 14px;
      font-size: 1.8rem;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    #category-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 480px;
      margin-bottom: 44px;
    }

    #category-screen h2 {
      font-weight: 900;
      font-size: 1.7rem;
      margin-bottom: 22px;
      color: #ffffff;
      border-left: 6px solid #6c63ff;
      padding-left: 14px;
      letter-spacing: 1px;
      align-self: flex-start;
    }

    .category-btn {
      display: block;
      width: 100%;
      padding: 15px 24px;
      margin-bottom: 14px;
      font-size: 1.15rem;
      font-weight: 800;
      text-align: left;
      background-color: #1a1a2e;
      color: #fff;
      border: 2px solid #6c63ff;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      letter-spacing: 0.5px;
    }

    .category-btn:hover {
      background-color: #6c63ff;
      transform: translateX(6px);
    }

    #stats-title {
      font-weight: 900;
      font-size: 1.5rem;
      color: #ffffff;
      border-left: 6px solid #ff5c5c;
      padding-left: 12px;
      letter-spacing: 1px;
      margin-bottom: 16px;
      width: 100%;
      max-width: 720px;
    }

    #dashboard {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      width: 100%;
      max-width: 720px;
    }

    .dash-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      border-radius: 14px;
      padding: 18px 10px;
      box-shadow: 0 3px 14px rgba(0,0,0,0.3);
      transition: transform 0.15s;
      border: 1px solid #2e2e4e;
    }

    .dash-item:hover { transform: translateY(-4px); }
    .dash-icon { font-size: 2rem; margin-bottom: 8px; }

    .dash-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .dash-value {
      font-size: 1.6rem;
      font-weight: 900;
      color: #6c63ff;
    }

    #level-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-right: 200px;
      padding: 30px 40px;
      color: #ffffff;
    }

    #level-screen h2 {
      font-size: 1.8rem;
      color: #6c63ff;
    }

    #level-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      max-width: 500px;
    }

    .level-btn {
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: 700;
      border: 2px solid #6c63ff;
      border-radius: 10px;
      background: #1a1a2e;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
      min-width: 100px;
    }

    .level-btn:hover { background: #6c63ff; }

    .level-btn.locked {
      border-color: #2e2e2e;
      color: #444;
      cursor: not-allowed;
    }

    .level-btn.locked:hover { background: #1a1a2e; }

    .back-btn {
      padding: 10px 24px;
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.2s;
    }

    .back-btn:hover { background: #333; }

    #game-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-right: 200px;
      padding: 30px 40px;
    }

    #hint-btn {
      padding: 10px 24px;
      font-size: 1rem;
      cursor: pointer;
      background: #f5a623;
      color: #fff;
      border: none;
      border-radius: 8px;
      transition: background 0.2s;
      font-weight: 700;
    }

    #hint-btn:hover { background: #d4891a; }

    #hint-btn:disabled {
      background: #2a2a2a;
      color: #444;
      cursor: not-allowed;
    }

    #dashboard-popup, #leaderboard-popup, #settings-popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 999;
      justify-content: center;
      align-items: center;
    }

    .modal-box {
      background: #1a1a2e;
      border: 2px solid #6c63ff;
      border-radius: 16px;
      padding: 32px;
      min-width: 320px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      color: #ffffff;
    }

    .modal-box h2 {
      margin-bottom: 16px;
      color: #6c63ff;
    }

    .modal-box button {
      margin-top: 16px;
      padding: 10px 24px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      width: 100%;
      transition: background 0.2s;
    }

    .modal-box button:hover { background: #574fd6; }

    .leaderboard-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #2e2e4e;
      font-size: 0.95rem;
    }

    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #2e2e4e;
    }

    .radio-switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }

    .radio-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #2e2e2e;
      border-radius: 24px;
      transition: 0.3s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider { background-color: #6c63ff; }
    input:checked + .slider:before { transform: translateX(20px); }
  </style>
</head>
<body>

  <!-- RIGHT SIDEBAR -->
  <div id="top-bar">
    <h1>🎮 Hangman</h1>
    <div id="top-buttons">
      <button class="top-btn" onclick="showDashboard()">📊 Dashboard</button>
      <button class="top-btn" onclick="showLeaderboard()">🏆 Leaderboard</button>
      <button class="top-btn" onclick="showSettings()">⚙️ Settings</button>
      <button class="top-btn logout" onclick="logout()">🚪 Logout</button>
    </div>
  </div>

  <p id="player-name"></p>

  <!-- MAIN CONTENT -->
  <div id="main-content">

    <div id="hangman-icon">
      <canvas id="hangman-preview" width="170" height="210"></canvas>
      <h2>🪢 Hangman Game</h2>
    </div>

    <div id="category-screen">
      <h2>Choose a Category</h2>
      <button class="category-btn" onclick="showLevelScreen('computer')">💻 Computer Fundamentals</button>
      <button class="category-btn" onclick="showLevelScreen('lifestyle')">🏃 Lifestyle</button>
    </div>

    <div id="stats-title">📈 Your Stats</div>
    <div id="dashboard">
      <div class="dash-item">
        <span class="dash-icon">⭐</span>
        <span class="dash-label">Level</span>
        <span class="dash-value" id="dash-level">1</span>
      </div>
      <div class="dash-item">
        <span class="dash-icon">🪙</span>
        <span class="dash-label">Coins</span>
        <span class="dash-value" id="dash-coins">0</span>
      </div>
      <div class="dash-item">
        <span class="dash-icon">🏆</span>
        <span class="dash-label">Wins</span>
        <span class="dash-value" id="dash-wins">0</span>
      </div>
      <div class="dash-item">
        <span class="dash-icon">❌</span>
        <span class="dash-label">Losses</span>
        <span class="dash-value" id="dash-losses">0</span>
      </div>
    </div>

  </div>

  <!-- LEVEL SCREEN -->
  <div id="level-screen">
    <h2>Select Level</h2>
    <p id="level-category-name" style="color:#888"></p>
    <div id="level-grid"></div>
    <button class="back-btn" onclick="showCategories()">⬅ Back</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen">
    <p id="riddle-text"></p>
    <canvas id="hangman-canvas" width="200" height="250"></canvas>
    <p id="wrong-count">Wrong guesses: 0 / 6</p>
    <div id="word-display"></div>
    <button id="hint-btn" onclick="useHint()">💡 Hint (-5 coins)</button>
    <div id="keyboard"></div>
    <p id="message"></p>
    <button id="restart-btn" onclick="showCategories()">Choose Another Category</button>
    <button id="logout-btn" onclick="logout()">Logout</button>
  </div>

  <!-- DASHBOARD POPUP -->
  <div id="dashboard-popup" onclick="if(event.target===this) closeAllModals()">
    <div class="modal-box">
      <h2>📊 Dashboard</h2>
      <div id="dashboard-content"></div>
      <button onclick="closeAllModals()">Close</button>
    </div>
  </div>

  <!-- LEADERBOARD POPUP -->
  <div id="leaderboard-popup" onclick="if(event.target===this) closeAllModals()">
    <div class="modal-box">
      <h2>🏆 Leaderboard</h2>
      <div id="leaderboard-content"></div>
      <button onclick="closeAllModals()">Close</button>
    </div>
  </div>

  <!-- SETTINGS POPUP -->
  <div id="settings-popup" onclick="if(event.target===this) closeAllModals()">
    <div class="modal-box">
      <h2>⚙️ Settings</h2>
      <div class="setting-item">
        <span>🔊 Sound Effects</span>
        <label class="radio-switch">
          <input type="checkbox" id="sound-toggle" checked onchange="toggleSound()">
          <span class="slider"></span>
        </label>
      </div>
      <div class="setting-item">
        <span>🎵 Music</span>
        <label class="radio-switch">
          <input type="checkbox" id="music-toggle" checked onchange="toggleMusic()">
          <span class="slider"></span>
        </label>
      </div>
      <button onclick="closeModal('settings-popup')">Close</button>
    </div>
  </div>

  <script>
    const previewCanvas = document.getElementById('hangman-preview');
    const pctx = previewCanvas.getContext('2d');
    pctx.strokeStyle = '#6c63ff';
    pctx.lineWidth = 4;
    pctx.lineCap = 'round';
    pctx.beginPath();
    pctx.moveTo(20, 195); pctx.lineTo(150, 195);
    pctx.moveTo(65, 195); pctx.lineTo(65, 20);
    pctx.moveTo(65, 20);  pctx.lineTo(120, 20);
    pctx.moveTo(120, 20); pctx.lineTo(120, 48);
    pctx.stroke();
    pctx.beginPath();
    pctx.arc(120, 62, 15, 0, Math.PI * 2);
    pctx.stroke();
    pctx.beginPath();
    pctx.moveTo(120, 77); pctx.lineTo(120, 130);
    pctx.stroke();
    pctx.beginPath();
    pctx.moveTo(120, 92); pctx.lineTo(92, 114);
    pctx.moveTo(120, 92); pctx.lineTo(148, 114);
    pctx.stroke();
    pctx.beginPath();
    pctx.moveTo(120, 130); pctx.lineTo(92, 162);
    pctx.moveTo(120, 130); pctx.lineTo(148, 162);
    pctx.stroke();
  </script>

  <script src="script.js"></script>
</body>
</html>
