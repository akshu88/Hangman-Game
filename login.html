<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-card">
        <!-- Logo/Title-->
        <div class="logo">
            <span class="hangman-icon">🪢</span>
            <h1>Hangman Game</h1>
            <p>Sign in to play the game!</p>
        </div>

        <!-- Login Form -->
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username" />
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" />
        </div>

        <!-- Error message -->
        <p id="error-msg"></p>

        <!-- Login Button -->
        <button class="btn-login" onclick="handleLogin()">Login</button>

        <!-- Divider-->
        <div class="divider">
            <span>or</span>
        </div>

        <!-- Google Sign-in Button -->
        <button class="btn-google" onclick="handleGoogle()">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" />
            Continue with Google
        </button>

        <!-- Sign up link-->
        <p class="signup-text">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
    <script src="login.js"></script>
</body>
</html>
